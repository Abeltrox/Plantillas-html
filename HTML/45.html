<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantilla numero 45</title>
    <link rel="stylesheet" href="../HTML/css/style45.css">
</head>
<body>

    <main class="layout-grid">
        <div class="column-left">
            
            <section class="hero-section" style="background-image: url('image/45/Image left.png');">
                <div class="hero-text">
                    <h1 class="hero-title">Design, create, and be passionate</h1>
                    <p class="hero-description">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Cursus imperdiet sed idt.</p>
                    <button class="button-primary">Get started</button>
                </div>
            </section>

            <div class="row-button">
                <div class="detail-card">
                    <img src="image/45/Image bottom left - left.png" alt="Detail 1" class="detail-image">
                </div>
                <div class="detail-card">
                    <img src="image/45/Image bottom left - right.png" alt="Detail 2" class="detail-image">
                </div>
            </div>
        </div>

        <aside class="column-right">
            <img src="image/45/Image right.png" alt="Main Product" class="main-image">
        </aside>
    </main>

</html>
